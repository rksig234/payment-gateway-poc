server:
  port: 8090

spring:
  application:
    name: payment-platform
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/payments}
    username: ${DB_USER:payments}
    password: ${DB_PASSWORD:payments}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

# Module A — routing to the provider stubs (separate app).
gateway:
  routing:
    stubs-base-url: ${STUBS_BASE_URL:http://localhost:8080}

# Circuit breaker per provider (deck values).
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 3
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
        registerHealthIndicator: true
    instances:
      upi:
        baseConfig: default
      neft:
        baseConfig: default
      card:
        baseConfig: default

# Module C — daily DLQ review.
dlq:
  review:
    cron: "0 0 9 * * *"

# Module C — notifications. SNS off by default (no AWS creds needed locally).
notification:
  sns:
    enabled: ${SNS_ENABLED:false}
    topic-arn: ${SNS_TOPIC_ARN:}
    region: ${AWS_REGION:ap-south-1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [trace=%X{traceId:-} ref=%X{refId:-}] %logger{32} - %msg%n"
