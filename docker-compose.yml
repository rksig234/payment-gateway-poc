# Full local environment: infrastructure + the two application services.
#
#   docker compose up -d --build      # build images and start everything
#   docker compose up -d kafka redis postgres jaeger prometheus grafana   # infra only (run apps from IDE)
#
# Apps:  payment-platform :8090 (gateway + status + retry + notification)
#        payment-stubs    :8080 (UPI / NEFT / Card)
# Infra: Kafka 9092 · Redis 6379 · Postgres 5432 · Jaeger 16686 · Prometheus 9090 · Grafana 3000
name: payment-gateway-poc

services:
  # ---------------------------------------------------------------- infra ----
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "INTERNAL://:9094,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "INTERNAL://kafka:9094,EXTERNAL://localhost:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9094 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  kafka-init:
    image: bitnami/kafka:3.7
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for t in payment.initiated payment.success payment.failed payment.retry payment.dlq; do
          /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9094 \
            --create --if-not-exists --topic "$$t" --partitions 3 --replication-factor 1
        done
        /opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9094 --list

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payments
      POSTGRES_USER: payments
      POSTGRES_PASSWORD: payments
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payments"]
      interval: 10s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ------------------------------------------------------------ services ----
  payment-stubs:
    build:
      context: .
      args: { MODULE: payment-stubs, PORT: "8080" }
    ports:
      - "8080:8080"

  payment-platform:
    build:
      context: .
      args: { MODULE: payment-platform, PORT: "8090" }
    ports:
      - "8090:8090"
    environment:
      KAFKA_BOOTSTRAP: kafka:9094
      REDIS_HOST: redis
      DB_URL: "jdbc:postgresql://postgres:5432/payments"
      STUBS_BASE_URL: "http://payment-stubs:8080"
      SNS_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      payment-stubs:
        condition: service_started
