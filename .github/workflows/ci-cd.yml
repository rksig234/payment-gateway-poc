name: ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
  ECR_NAMESPACE: payment-gateway

permissions:
  contents: read
  id-token: write   # for AWS OIDC

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build, unit + integration tests
        run: mvn -B verify

  docker-build-push:
    name: Build & push images
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { module: payment-stubs, port: 8080 }
          - { module: payment-platform, port: 8090 }
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "${ECR_NAMESPACE}/${{ matrix.module }}" \
            || aws ecr create-repository --repository-name "${ECR_NAMESPACE}/${{ matrix.module }}"
      - name: Build & push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          IMAGE="${REGISTRY}/${ECR_NAMESPACE}/${{ matrix.module }}"
          docker build \
            --build-arg MODULE=${{ matrix.module }} \
            --build-arg PORT=${{ matrix.port }} \
            -t "${IMAGE}:${{ github.sha }}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

  deploy:
    name: Terraform plan & apply
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production   # GitHub Environment = manual approval gate
    defaults:
      run:
        working-directory: infra/envs/poc
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform plan -var="image_tag=${{ github.sha }}" -out=tfplan
      - run: terraform apply -auto-approve tfplan
